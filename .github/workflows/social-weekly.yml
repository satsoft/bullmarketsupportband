name: Social — Weekly Overview

# Flagship weekly overview (regime + reclaimed + lost), Monday pre-NYO, after the
# weekly candle close. 12:00 UTC Monday ≈ 8:00 AM ET (EDT).
on:
  schedule:
    - cron: '0 12 * * 1'
  workflow_dispatch:

jobs:
  social-weekly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - run: npm ci
      - name: Post weekly overview
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
          SOCIAL_BOT_ENABLED: ${{ vars.SOCIAL_BOT_ENABLED }}
          SOCIAL_DRY_RUN: ${{ vars.SOCIAL_DRY_RUN }}
          SOCIAL_IMAGES: ${{ vars.SOCIAL_IMAGES }}
          SOCIAL_SITE_URL: https://www.bullmarketsupportband.com
        run: npx tsx scripts/social-bot.ts weekly

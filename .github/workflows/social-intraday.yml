name: Social — Intraday Event Sweep

# High-signal event posts (band crosses, top-100 entries, regime flips).
# Runs after the hourly BMSB calc. The bot self-gates to notification-worthy events
# and respects a daily cap + min-interval, so most runs post nothing.
on:
  schedule:
    - cron: '15 * * * 1-5'      # hourly, weekdays (UTC)
    - cron: '15 */3 * * 6,0'    # every 3h, weekends (reduced)
  workflow_dispatch:

jobs:
  social-intraday:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - run: npm ci
      - name: Run intraday sweep
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
          SOCIAL_BOT_ENABLED: ${{ vars.SOCIAL_BOT_ENABLED }}
          SOCIAL_DRY_RUN: ${{ vars.SOCIAL_DRY_RUN }}
          SOCIAL_IMAGES: ${{ vars.SOCIAL_IMAGES }}
          SOCIAL_SITE_URL: https://www.bullmarketsupportband.com
        run: npx tsx scripts/social-bot.ts intraday
